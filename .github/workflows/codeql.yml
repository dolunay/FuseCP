name: CodeQL

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }} / ${{ matrix.build_scope }})
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build_scope: server
          - language: csharp
            build_scope: enterprise
          - language: javascript-typescript
            build_scope: none

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Add MSBuild to PATH
        if: matrix.language == 'csharp'
        uses: microsoft/setup-msbuild@v2

      - name: Install .NET SDK 10
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build C# solutions for CodeQL
        if: matrix.language == 'csharp'
        shell: pwsh
        run: |
          if ("${{ matrix.build_scope }}" -eq "server") {
            dotnet build .\FuseCP\Sources\FuseCP.Server.sln -c Release --nologo
          }
          elseif ("${{ matrix.build_scope }}" -eq "enterprise") {
            dotnet build .\FuseCP\Sources\FuseCP.EnterpriseServer.sln -c Release --nologo
          }

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}-${{ matrix.build_scope }}'
