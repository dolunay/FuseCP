name: CodeQL

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }} / ${{ matrix.build_scope }})
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build_scope: server
          - language: csharp
            build_scope: enterprise
          - language: javascript-typescript
            build_scope: none

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Normalize checkout for JS CodeQL extraction
        if: matrix.language == 'javascript-typescript'
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          # Re-checkout after config update so tracked files and submodules use LF.
          git reset --hard HEAD
          git submodule foreach --recursive "git config core.autocrlf false; git config core.eol lf; git reset --hard HEAD"

      - name: Add MSBuild to PATH
        if: matrix.language == 'csharp'
        uses: microsoft/setup-msbuild@v2

      - name: Install .NET SDK 10.0.200
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          # Pin to a known available SDK to avoid transient channel manifest 404s.
          dotnet-version: '10.0.200'

      - name: Build C# solutions for CodeQL
        if: matrix.language == 'csharp'
        shell: pwsh
        run: |
          if ("${{ matrix.build_scope }}" -eq "server") {
            dotnet build .\FuseCP\Sources\FuseCP.Server.sln -c Debug -m:1 -p:BuildInParallel=false --nologo
          }
          elseif ("${{ matrix.build_scope }}" -eq "enterprise") {
            dotnet build .\FuseCP\Sources\FuseCP.EnterpriseServer.sln -c Debug -m:1 -p:BuildInParallel=false --nologo
          }

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}-${{ matrix.build_scope }}'
