# built on .NET Core.
# To learn how to migrate your existing application to .NET Core,
# refer to https://docs.microsoft.com/en-us/dotnet/desktop-wpf/migration/convert-project-from-net-framework
#
# To configure this workflow:
#
# 1. Configure environment variables
# GitHub sets default environment variables for every workflow run.
# Replace the variables relative to your project in the "env" section below.
#
# 2. Signing
# Generate a signing certificate in the Windows Application
# Packaging Project or add an existing signing certificate to the project.
# Next, use PowerShell to encode the .pfx file using Base64 encoding
# by running the following Powershell script to generate the output string:
#
# $pfx_cert = Get-Content '.\SigningCertificate.pfx' -Encoding Byte
# [System.Convert]::ToBase64String($pfx_cert) | Out-File 'SigningCertificate_Encoded.txt'
#
# Open the output file, SigningCertificate_Encoded.txt, and copy the
# string inside. Then, add the string to the repo as a GitHub secret
# and name it "Base64_Encoded_Pfx."
# For more information on how to configure your signing certificate for
# this workflow, refer to https://github.com/microsoft/github-actions-for-desktop-apps#signing
#
# Finally, add the signing certificate password to the repo as a secret and name it "Pfx_Key".
# See "Build the Windows Application Packaging project" below to see how the secret is used.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Action workflows for Desktop Applications,
# refer to https://github.com/microsoft/github-actions-for-desktop-apps

name: Test
run-name: ${{ github.event.head_commit.message }} by @${{ github.actor }}, Tests

on:
  push:
    branches: [ "release", "main" ]
  pull_request:
    branches: [ "release", "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  Test:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-2025  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    permissions:
      checks: write
      contents: write
      issues: write
      packages: write
      pull-requests: write

    timeout-minutes: 60

    env:
      Configuration: ${{ matrix.configuration }}
      GitHubAction: true

    steps:

    - name: Install WSL Ubuntu
      shell: pwsh
      run: |
        wsl --set-default-version 2
        wsl --install -d Ubuntu-24.04 --no-launch
        if ($LASTEXITCODE -ne 0) {
          Write-Host "wsl --install returned $LASTEXITCODE (continuing; distro may already be installed)."
        }
        wsl --distribution Ubuntu-24.04 --user root bash -lc "apt-get update && apt-get install -y wget ca-certificates"

    - name: Install .NET SDK 10.0.200 in WSL
      shell: pwsh
      run: |
        wsl wget https://builds.dotnet.microsoft.com/dotnet/Sdk/10.0.200/dotnet-sdk-10.0.200-linux-x64.tar.gz
        $linuxTarPath = wsl wslpath -a dotnet-sdk-10.0.200-linux-x64.tar.gz
        wsl --distribution Ubuntu-24.04 --user root bash -lc "mkdir -p /usr/lib/dotnet && tar -xvzf '$linuxTarPath' -C /usr/lib/dotnet"
        wsl --distribution Ubuntu-24.04 /usr/lib/dotnet/dotnet --info
        wsl --distribution Ubuntu-24.04 /usr/lib/dotnet/dotnet dev-certs https

    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install .NET SDK 10.0.200
      uses: actions/setup-dotnet@v5
      with:
        # Pin to avoid setup-dotnet channel resolving to unavailable SDK artifacts.
        dotnet-version: '10.0.200'

    - name: Install Development Certificates
      continue-on-error: true
      run: dotnet dev-certs https

    - name: Verify solution sync (FuseCP.sln vs scope solutions)
      shell: pwsh
      run: |
        pwsh -NoProfile -File .\FuseCP\Tools\check-sln-scope-sync.ps1

    - name: Automated Database Workflow Verification
      shell: pwsh
      run: |
        pwsh -NoProfile -File .\FuseCP\Tools\Orchestrate-Database-Workflow.ps1 -Mode Full -BlockBuildOnFailure -JsonOutputPath db-workflow-report.json

    - name: Upload Database Verification Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Database-Workflow-Report
        path: db-workflow-report.json
        retention-days: 7

    - name: Build Server & EnterpriseServer
      working-directory: FuseCP\Sources
      run: |
        dotnet build --configuration ${{ matrix.configuration }} FuseCP.Server.sln
        dotnet build --configuration ${{ matrix.configuration }} FuseCP.EnterpriseServer.sln
        dotnet build --configuration ${{ matrix.configuration }} FuseCP.Tests.sln

    - name: Run Unit Tests
      id: test
      working-directory: FuseCP\Sources
      continue-on-error: true
      run: |
        dotnet test --no-build -v n --logger trx -m:1 -p:BuildInParallel=false --configuration ${{ matrix.configuration }} --results-directory ..\..\test-results FuseCP.Tests.sln
 
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: Test-Results
        path: test-results
        retention-days: 7

    - name: Publish Unit Tests
      id: process-trx
      continue-on-error: true  # fork PRs don't have write permission to create status checks or PR comments
      uses: im-open/process-dotnet-test-results@v3.0.1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        base-directory: './test-results'
        create-status-check: true
        create-pr-comment: true
        update-comment-if-one-exists: true
        ignore-test-failures: true
        timezone: 'europe/zurich'
        comment-identifier: 'bff-tests'
        
    - name: Fail if Tests Failed
      shell: pwsh
      run: |
        $trxFiles = Get-ChildItem -Path ./test-results -Filter *.trx -Recurse -ErrorAction SilentlyContinue
        if (-not $trxFiles -or $trxFiles.Count -eq 0) {
          Write-Error "No TRX files found. Treating this as a test infrastructure failure."
          exit 1
        }

        [int]$failedCount = 0
        foreach ($trx in $trxFiles) {
          try {
            [xml]$doc = Get-Content -Path $trx.FullName
            $failed = @($doc.TestRun.Results.UnitTestResult | Where-Object { $_.outcome -eq 'Failed' }).Count
            $failedCount += $failed
          } catch {
            Write-Error "Failed to parse TRX file: $($trx.FullName). $_"
            exit 1
          }
        }

        if ($failedCount -gt 0) {
          Write-Host "Detected $failedCount failed test(s) across TRX results."
          exit 1
        }

        Write-Host "No failed tests detected in TRX results."


